name: Build iOS IPA

on:
  push:
    branches: [main]
    paths:
      - "Triple_2_Eyes_Protection_ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type (unsigned for AltStore, signed for paid dev account)"
        type: choice
        options: [unsigned, signed]
        default: unsigned
      upload-to-release:
        description: "Upload IPA to GitHub Release"
        type: boolean
        default: false

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/Xcode*.app/Contents/Developer || true
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodegen generate
          echo "Generated .xcodeproj:"
          ls -la Triple2EyeProtection.xcodeproj/ || echo "(project structure OK)"

      - name: Resolve package dependencies
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Triple2EyeProtection.xcodeproj \
            -scheme Triple2EyeProtection \
            || true

      # --- Unsigned build (default, for AltStore sideloading) ---
      - name: Build unsigned archive
        if: inputs.build-type == 'unsigned' || github.event_name == 'push'
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodebuild archive \
            -project Triple2EyeProtection.xcodeproj \
            -scheme Triple2EyeProtection \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/Triple2EyeProtection.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # --- Signed build (requires GitHub Secrets) ---
      - name: Build signed archive
        if: inputs.build-type == 'signed'
        working-directory: Triple_2_Eyes_Protection_ios
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 900 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo -n "${APPLE_CERTIFICATE_BASE64}" | base64 --decode -o "${RUNNER_TEMP}/cert.p12"
          security import "${RUNNER_TEMP}/cert.p12" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security

          security list-keychains -d user -s "${KEYCHAIN_PATH}"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${PROVISIONING_PROFILE_BASE64}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          xcodebuild archive \
            -project Triple2EyeProtection.xcodeproj \
            -scheme Triple2EyeProtection \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/Triple2EyeProtection.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            -allowProvisioningUpdates \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # --- Package unsigned IPA ---
      - name: Create unsigned IPA
        if: inputs.build-type == 'unsigned' || github.event_name == 'push'
        run: |
          APP_DIR="${RUNNER_TEMP}/Triple2EyeProtection.xcarchive/Products/Applications"
          if [ -d "${APP_DIR}/Triple2EyeProtection.app" ]; then
            mkdir -p "${RUNNER_TEMP}/Payload"
            cp -r "${APP_DIR}/Triple2EyeProtection.app" "${RUNNER_TEMP}/Payload/"
            (cd "${RUNNER_TEMP}" && zip -r Triple2EyeProtection-unsigned.ipa Payload/)
            rm -rf "${RUNNER_TEMP}/Payload"
            echo "Unsigned IPA: $(ls -lh "${RUNNER_TEMP}/Triple2EyeProtection-unsigned.ipa" | awk '{print $5}')"
          else
            echo "::error::.app not found at ${APP_DIR}"
            ls -la "${APP_DIR}" || echo "Directory missing"
            exit 1
          fi

      # --- Package signed IPA ---
      - name: Export signed IPA
        if: inputs.build-type == 'signed'
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/Triple2EyeProtection.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "${RUNNER_TEMP}/export"
          mv "${RUNNER_TEMP}/export/Triple2EyeProtection.ipa" \
             "${RUNNER_TEMP}/Triple2EyeProtection-signed.ipa"
          echo "Signed IPA created"

      # --- Upload ---
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Triple2EyeProtection-IPA
          path: |
            ${{ runner.temp }}/Triple2EyeProtection-unsigned.ipa
            ${{ runner.temp }}/Triple2EyeProtection-signed.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        run: |
          {
            echo "## :iphone: iOS Build Complete"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Build type | \`${{ inputs.build-type || 'unsigned' }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo "### :warning: Installation"
            echo "Use **[AltStore](https://altstore.io)** or **[SideStore](https://sidestore.io)** to sideload the IPA."
            echo "Free Apple ID: 7-day signature, AltStore auto-refreshes on same WiFi."
          } >> $GITHUB_STEP_SUMMARY

  # --- Optional: attach to GitHub Release ---
  upload-release:
    if: inputs.upload-to-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Triple2EyeProtection-IPA
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Triple2EyeProtection-unsigned.ipa
          tag_name: ios-${{ github.run_number }}
          name: "iOS Build #${{ github.run_number }}"
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
