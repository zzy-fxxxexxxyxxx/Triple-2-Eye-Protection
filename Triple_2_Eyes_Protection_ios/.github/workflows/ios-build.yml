name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        type: choice
        options: [unsigned, signed]
        default: unsigned
      upload-to-release:
        description: "Upload IPA to GitHub Release"
        type: boolean
        default: false

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Toolchain ----------
      - name: Select Xcode
        run: |
          # List available Xcode versions
          ls /Applications/Xcode*.app/Contents/Developer || true
          # Switch to latest available (macos-14 has Xcode 15.4 by default)
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # ---------- Generate .xcodeproj ----------
      - name: Generate Xcode project
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodegen generate
          echo "Generated .xcodeproj:"
          ls -la Triple2EyeProtection.xcodeproj/

      # ---------- Resolve dependencies ----------
      - name: Resolve package dependencies
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Triple2EyeProtection.xcodeproj \
            -scheme Triple2EyeProtection \
            || true

      # ---------- Build (unsigned) ----------
      - name: Build unsigned archive
        if: inputs.build-type == 'unsigned' || github.event_name == 'push'
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodebuild archive \
            -project Triple2EyeProtection.xcodeproj \
            -scheme Triple2EyeProtection \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/Triple2EyeProtection.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="DEBUG"

      # ---------- Build (signed — requires secrets) ----------
      - name: Build signed archive
        if: inputs.build-type == 'signed'
        working-directory: Triple_2_Eyes_Protection_ios
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          # Import signing certificate
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 900 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo -n "${APPLE_CERTIFICATE_BASE64}" | base64 --decode -o "${RUNNER_TEMP}/cert.p12"
          security import "${RUNNER_TEMP}/cert.p12" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "${KEYCHAIN_PATH}"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${PROVISIONING_PROFILE_BASE64}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          # Build
          xcodebuild archive \
            -project Triple2EyeProtection.xcodeproj \
            -scheme Triple2EyeProtection \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/Triple2EyeProtection.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            -allowProvisioningUpdates \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # ---------- Package IPA ----------
      - name: Create unsigned IPA
        if: inputs.build-type == 'unsigned' || github.event_name == 'push'
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          APP_DIR="${RUNNER_TEMP}/Triple2EyeProtection.xcarchive/Products/Applications"
          if [ -d "${APP_DIR}/Triple2EyeProtection.app" ]; then
            mkdir -p Payload
            cp -r "${APP_DIR}/Triple2EyeProtection.app" Payload/
            zip -r "${RUNNER_TEMP}/Triple2EyeProtection-unsigned.ipa" Payload/
            rm -rf Payload
            echo "Unsigned IPA created: $(ls -lh "${RUNNER_TEMP}/Triple2EyeProtection-unsigned.ipa" | awk '{print $5}')"
          else
            echo "::error::.app not found at ${APP_DIR}"
            ls -la "${APP_DIR}" || echo "Directory missing"
            exit 1
          fi

      - name: Create signed IPA via export
        if: inputs.build-type == 'signed'
        working-directory: Triple_2_Eyes_Protection_ios
        run: |
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/Triple2EyeProtection.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "${RUNNER_TEMP}/export"

          mv "${RUNNER_TEMP}/export/Triple2EyeProtection.ipa" "${RUNNER_TEMP}/Triple2EyeProtection-signed.ipa"
          echo "Signed IPA created"

      # ---------- Upload artifact ----------
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Triple2EyeProtection-IPA
          path: |
            ${{ runner.temp }}/Triple2EyeProtection-unsigned.ipa
            ${{ runner.temp }}/Triple2EyeProtection-signed.ipa
          retention-days: 30
          if-no-files-found: warn

      # ---------- Build summary ----------
      - name: Build summary
        run: |
          echo "## :iphone: iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build type:** ${{ inputs.build-type || 'unsigned' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### :warning: Installation Note" >> $GITHUB_STEP_SUMMARY
          echo "If unsigned, use **[AltStore](https://altstore.io)** or **[SideStore](https://sidestore.io)** to sideload the IPA onto your iPhone with your free Apple ID." >> $GITHUB_STEP_SUMMARY
          echo "The IPA is limited to 7 days per signature (free account limit)." >> $GITHUB_STEP_SUMMARY

  # ---------- Optional: upload to GitHub Release ----------
  upload-release:
    if: inputs.upload-to-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Triple2EyeProtection-IPA
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Triple2EyeProtection-unsigned.ipa
            Triple2EyeProtection-signed.ipa
          tag_name: ios-${{ github.run_number }}
          name: "iOS Build #${{ github.run_number }}"
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
