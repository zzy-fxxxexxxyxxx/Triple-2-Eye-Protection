name: Triple2EyeProtection
options:
  bundleIdPrefix: com.triple2.eyeprotection
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Triple2EyeProtection:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Triple2EyeProtection
        excludes:
          - "**.entitlements"
      - path: LiveActivity
    entitlements:
      path: Triple2EyeProtection/Triple2EyeProtection.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.triple2.eyeprotection
        INFOPLIST_FILE: Triple2EyeProtection/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: false
        PROVISIONING_PROFILE_SPECIFIER: ""
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
    preBuildScripts:
      - name: "Skip Lint"
        script: "echo ok"
        basedOnDependencyAnalysis: false
    info:
      path: Triple2EyeProtection/Info.plist
      properties:
        UIBackgroundModes:
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.triple2.eyeprotection.refresh

  EyeCareWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: EyeCareWidget
        excludes:
          - "**.entitlements"
      - path: Triple2EyeProtection/Models/AppSettings.swift
      - path: Triple2EyeProtection/Models/UsageStore.swift
    entitlements:
      path: EyeCareWidget/EyeCareWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.triple2.eyeprotection.widget
        INFOPLIST_FILE: EyeCareWidget/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: false
        PROVISIONING_PROFILE_SPECIFIER: ""
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: false
    info:
      path: EyeCareWidget/Info.plist

schemes:
  Triple2EyeProtection:
    build:
      targets:
        Triple2EyeProtection: all
        EyeCareWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
