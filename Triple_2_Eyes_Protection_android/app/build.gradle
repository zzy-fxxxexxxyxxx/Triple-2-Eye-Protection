plugins {
    id "com.android.application"
}

android {
    namespace "com.triple2.eyeprotection"
    compileSdk 35

    defaultConfig {
        applicationId "com.triple2.eyeprotection"
        minSdk 26
        targetSdk 33
        versionCode 3
        versionName "0.1.2"
        setProperty("archivesBaseName", "Triple2EyeProtection-Android-${versionName}")
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}
